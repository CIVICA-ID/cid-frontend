<div class="card overflow-hidden border border-slate-200 shadow-md">
  <div class="relative border-b border-slate-200 bg-slate-50 px-6 py-5 md:px-8">
    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-cyan-500 via-sky-500 to-indigo-500"></div>

    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="min-w-0">
        <h2 class="m-0 text-2xl font-semibold leading-tight text-slate-900">{{ title }}</h2>
        @if (subtitle) {
          <p class="mb-0 mt-2 text-sm text-slate-600">{{ subtitle }}</p>
        }

        <div class="mt-3 flex flex-wrap items-center gap-2">
          <ng-content select="[header-meta]"></ng-content>
        </div>
      </div>

      <div class="flex flex-col-reverse gap-2 sm:flex-row sm:items-center lg:self-start">
        <ng-content select="[header-actions]"></ng-content>
      </div>
    </div>
  </div>
</div>
