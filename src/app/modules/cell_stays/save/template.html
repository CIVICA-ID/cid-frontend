<p-toast [breakpoints]="{ '920px': { width: '100%', right: '0', left: '0' } }" key="msg" />
<div class="flex justify-center p-4">
  <div class="w-full md:max-w-6xl">
    <div class="card p-6 bg-white shadow-md rounded-lg">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <p-fluid>
          <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
              <label for="cellRegister" class="font-semibold">Registro de celda</label>
              <input pInputText id="cellRegister" formControlName="cellRegister">
              @if (form.get('cellRegister')?.hasError('required')) {
                <small class="text-red-600 text-right block text-xs">*Campo requerido</small>
              }
            </div>
            <div class="flex flex-col gap-2">
              <label for="entryDate" class="font-semibold">Fecha de ingreso</label>
              <input pInputText id="entryDate" type="date" formControlName="entryDate">
            </div>
            <div class="flex flex-col gap-2">
              <label for="observations" class="font-semibold">Observaciones</label>
              <textarea pInputTextarea id="observations" formControlName="observations" rows="4"></textarea>
            </div>
          </div>
        </p-fluid>
        <div class="flex justify-end gap-3 mt-6">
          <button pButton pRipple label="Cancelar" (click)="onCancel($event)" class="p-button-outlined !w-32"></button>
          <button pButton pRipple type="submit" label="Guardar" class="!w-32"></button>
        </div>
      </form>
    </div>
  </div>
</div>
