<p-toast key="msg" [breakpoints]="{ '0px': { width: '100%', right: '0', left: '0' } }"></p-toast>

<section class="relative min-h-screen overflow-hidden bg-surface-100 text-surface-900">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(56,189,248,0.18),_transparent_30%),radial-gradient(circle_at_bottom_right,_rgba(16,185,129,0.12),_transparent_32%),linear-gradient(135deg,rgba(248,250,252,0.98),rgba(226,232,240,0.88))]"></div>
    <div class="pointer-events-none absolute inset-0">
        <div class="absolute left-[-6rem] top-[-5rem] h-72 w-72 rounded-full bg-cyan-400/10 blur-3xl"></div>
        <div class="absolute right-[-5rem] top-1/3 h-80 w-80 rounded-full bg-emerald-400/08 blur-3xl"></div>
        <div class="absolute bottom-[-7rem] left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-primary-400/06 blur-3xl"></div>
    </div>

    <div class="relative mx-auto flex min-h-screen w-full max-w-6xl items-center px-4 py-8 sm:px-6 lg:px-8">
        <div class="mx-auto w-full max-w-3xl">
            <div class="relative overflow-hidden rounded-[1.75rem] border border-surface-200/80 bg-white/95 p-5 shadow-[0_18px_50px_rgba(15,23,42,0.08)] backdrop-blur-xl sm:p-7 lg:p-8">
                <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-surface-300/70 to-transparent"></div>

                <div class="relative space-y-4">
                    <div class="space-y-2 text-center">
                        <div class="flex justify-center">
                            <img src="/logos_blanco_negro/logo3x.png" alt="CIVICA ID Logo" class="block h-40 w-auto" />
                        </div>

                        <h2 class="title-h5 !text-surface-900">Sucursales</h2>
                        <p class="body-small !text-surface-500">
                            Elige la sucursal con la que vas a trabajar.
                        </p>
                    </div>

                    <div class="flex items-center justify-between rounded-2xl border border-surface-200 bg-surface-50 px-4 py-3 text-sm text-surface-600">
                        <span>Usuario: <strong class="text-surface-900">{{ nickName }}</strong></span>
                        <button type="button" class="text-primary-600 hover:text-primary-700" (click)="returnHome()">Volver</button>
                    </div>

                    <div *ngIf="loading" class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        <div class="h-28 animate-pulse rounded-2xl border border-surface-200 bg-surface-100"></div>
                        <div class="h-28 animate-pulse rounded-2xl border border-surface-200 bg-surface-100"></div>
                    </div>

                    <div *ngIf="!loading" class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        @for (branch of branches; track branch.id) {
                            <button
                                type="button"
                                class="group relative overflow-hidden rounded-2xl border p-4 text-left transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg"
                                [ngClass]="{
                                    'border-primary-500 bg-primary-50 shadow-md shadow-primary-500/10 ring-2 ring-primary-500/10': selectedBranchId === branch.id,
                                    'border-surface-200 bg-white hover:border-primary-300': selectedBranchId !== branch.id
                                }"
                                (click)="selectBranch(branch.id)"
                            >
                                <div class="flex items-start gap-3">
                                    <div
                                        class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl text-lg transition-colors"
                                        [ngClass]="{
                                            'bg-primary-600 text-white': selectedBranchId === branch.id,
                                            'bg-surface-100 text-surface-600 group-hover:bg-primary-100 group-hover:text-primary-700': selectedBranchId !== branch.id
                                        }"
                                    >
                                        <i class="pi pi-building"></i>
                                    </div>
                                    <div class="min-w-0 flex-1">
                                        <p class="truncate text-base font-semibold text-surface-900">{{ branch.label }}</p>
                                        <p class="mt-1 text-sm text-surface-500">Sucursal disponible para tu sesión actual.</p>
                                    </div>
                                </div>

                                <div class="mt-4 flex items-center justify-between text-xs">
                                    <span class="text-surface-500">Click para seleccionar</span>
                                    @if (isCurrentBranch(branch.id)) {
                                        <span class="rounded-full bg-surface-900 px-2.5 py-1 font-medium text-white">Sucursal actual</span>
                                    } @else if (selectedBranchId === branch.id) {
                                        <span class="rounded-full bg-primary-600 px-2.5 py-1 font-medium text-white">Seleccionada</span>
                                    } @else {
                                        <span class="rounded-full bg-surface-100 px-2.5 py-1 font-medium text-surface-500">Disponible</span>
                                    }
                                </div>
                            </button>
                        }
                    </div>

                    <div *ngIf="!loading && branches.length === 0" class="rounded-2xl border border-dashed border-surface-300 bg-surface-50 px-4 py-5 text-center text-sm text-surface-600">
                        No tienes sucursales activas asignadas.
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        <button type="button" class="button-button !rounded-xl !border-surface-300 !bg-transparent !px-4 !py-3 !text-surface-700 hover:!bg-surface-100" (click)="returnHome()">
                            Cancelar
                        </button>
                        <button type="button" class="body-button !h-12 !w-full !rounded-xl text-base font-medium shadow-md shadow-primary-500/10" [disabled]="!selectedBranchId || loading" (click)="confirmBranch()">
                            Confirmar sucursal
                        </button>
                    </div>

                    <div class="mt-8 flex items-center justify-between border-t border-surface-200 pt-4 text-sm text-surface-500">
                        <span>©{{ currentYear }} CIVICA ID</span>
                        <span class="hidden sm:inline">Cambio de sucursal rápido y seguro</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
