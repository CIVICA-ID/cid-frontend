<p-toast [breakpoints]="{ '920px': { width: '100%', right: '0', left: '0' } }" key="message" />
<p-confirmDialog [style]="{ width: '50vw' }" rejectButtonStyleClass="p-button-outlined"></p-confirmDialog>
<div class="grid">
    <div class="col-12">
        <div class="card px-6">
<!--            <p-toolbar styleClass="pb-4">-->
<!--                <ng-template pTemplate="left">-->
<!--&lt;!&ndash;                    <button pButton label="Agregar" icon="pi pi-plus" class="p-button-success mr-2" [routerLink]="['/users/add']"></button>&ndash;&gt;-->
<!--                    <button pButton label="Eliminar" [disabled]="!ids.length" icon="pi pi-plus" class="p-button-danger mr-2" (click)="delete(null, 1)"></button>-->
<!--                </ng-template>-->
<!--            </p-toolbar>-->
            <app-page-section-header title="Listado de entradas de la corte" subtitle="Se registran las entradas y datos de la corte">
              <span
                  header-meta
                  class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-medium text-slate-700"
              >
                <i class="pi pi-list text-[10px]"></i>
                Registros: {{ totalRows }}
              </span>
            </app-page-section-header>
            <div class="pt-3">
                <app-table-template [columns]="columns" [data]="data" [configTable]="configTable" (idDelete)="delete($event, 2)" (idsDelete)="getIdsDeleted($event)" (paramsListChange)="handleParamsList($event)"></app-table-template>
            </div>
        </div>
    </div>
</div>
