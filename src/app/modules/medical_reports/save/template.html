<p-toast [breakpoints]="{ '920px': { width: '100%', right: '0', left: '0' } }" key="msg" />
<div class="flex justify-center p-4">
  <div class="w-full md:max-w-6xl">
    <div class="card p-6 bg-white shadow-md rounded-lg">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <p-fluid>
          <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
              <label for="id_offender" class="font-semibold">Infractor</label>
              <p-select
                [options]="offenderOptions"
                formControlName="id_offender"
                optionLabel="label"
                optionValue="value"
                placeholder="Seleccionar infractor"
                [filter]="true"
                [showClear]="true"
              ></p-select>
            </div>
            <div class="flex flex-col gap-2">
              <label for="id_staff" class="font-semibold">ID staff</label>
              <input pInputText id="id_staff" formControlName="id_staff">
            </div>
            <div class="flex flex-col gap-2">
              <label for="dictation_date" class="font-semibold">Fecha de dictamen</label>
              <input pInputText id="dictation_date" type="date" formControlName="dictation_date">
            </div>
            <div class="flex flex-col gap-2">
              <label for="blood_type" class="font-semibold">Tipo de sangre</label>
              <p-select
                [options]="bloodTypeOptions"
                formControlName="blood_type"
                optionLabel="label"
                optionValue="value"
                placeholder="Seleccionar"
                [showClear]="true"
              ></p-select>
            </div>
            <div class="flex flex-col gap-2">
              <label for="rh_factor" class="font-semibold">RH</label>
              <input pInputText id="rh_factor" formControlName="rh_factor">
            </div>
            <div class="flex flex-col gap-2">
              <label for="entry_status" class="font-semibold">Estado de ingreso</label>
              <input pInputText id="entry_status" formControlName="entry_status">
            </div>
            <div class="flex flex-col gap-2">
              <label for="weight" class="font-semibold">Peso (kg)</label>
              <input pInputText id="weight" type="number" step="0.01" formControlName="weight">
            </div>
            <div class="flex flex-col gap-2">
              <label for="height" class="font-semibold">Altura (m)</label>
              <input pInputText id="height" type="number" step="0.01" formControlName="height">
            </div>
            <div class="flex flex-col gap-2">
              <label for="dictation" class="font-semibold">Dictamen</label>
              <textarea pInputTextarea id="dictation" formControlName="dictation" rows="4"></textarea>
            </div>
            <div class="flex flex-col gap-2">
              <label for="observations" class="font-semibold">Observaciones</label>
              <textarea pInputTextarea id="observations" formControlName="observations" rows="4"></textarea>
            </div>
          </div>
        </p-fluid>
        <div class="flex justify-end gap-3 mt-6">
          <button pButton pRipple label="Cancelar" (click)="onCancel($event)" class="p-button-outlined !w-32"></button>
          <button pButton pRipple type="submit" label="Guardar" class="!w-32"></button>
        </div>
      </form>
    </div>
  </div>
</div>
