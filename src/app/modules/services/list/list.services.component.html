<p-toast [breakpoints]="{ '920px': { width: '100%', right: '0', left: '0' } }" key="message"/>
<p-confirmDialog  [style]="{width: '50vw'}" rejectButtonStyleClass="p-button-outlined"></p-confirmDialog>
<div class="grid">
    <div class="col-12">
        <div class="card px-6">
            <app-page-section-header title="Listado de Servicios" subtitle="Gestiona los servicios.">
            <span header-meta class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-medium text-slate-700">
                <i class="pi pi-list text-[10px]"></i>
                    Registros: {{ totalRows }}
            </span>
                <button header-actions pButton label="Agregar servicio" icon="pi pi-plus" class="p-button-success" [routerLink]="['/services/add']"></button>
            </app-page-section-header>
            <div class="pt-3">
                <app-table-template [columns]="columns" [data]="data"
                    [configTable]="configTable"
                    (idDelete)="delete($event, 2)" (idsDelete)="getIdsDeleted($event)" (paramsListChange)="handleParamsList($event)"></app-table-template>
            </div>
        </div>
    </div>
</div>
